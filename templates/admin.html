<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>へきネイター 管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #1a1a2e; color: #eee;
    padding: 24px 16px;
  }
  h1 { color: #e94560; margin-bottom: 6px; font-size: 1.4rem; }
  p.sub { color: #888; font-size: 0.8rem; margin-bottom: 24px; }
  table { width: 100%; max-width: 600px; border-collapse: collapse; }
  th { text-align: left; color: #888; font-size: 0.78rem; padding: 6px 8px;
       border-bottom: 1px solid #333; }
  td { padding: 8px 8px; font-size: 0.9rem; border-bottom: 1px solid #222; }
  .bar-wrap { background: #0f3460; border-radius: 4px; height: 8px; width: 160px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 4px;
               background: linear-gradient(90deg, #e94560, #f5a623); }
  .tag-low  { color: #e74c3c; font-size: 0.75rem; margin-left: 6px; }
  a { color: #e94560; font-size: 0.85rem; }
</style>
</head>
<body>
<h1>学習データ量</h1>
<p class="sub">少ない性癖ほど要プレイ。<a href="/">← ゲームに戻る</a></p>
<table>
  <tr><th>#</th><th>性癖</th><th>データ量</th><th></th></tr>
  {% set max_w = [stats[-1].data_weight, 1] | max if stats else 1 %}
  {% for s in stats %}
  <tr>
    <td>{{ loop.index }}</td>
    <td>{{ s.name }}{% if s.data_weight < 10 %}<span class="tag-low">要学習</span>{% endif %}</td>
    <td>
      <div class="bar-wrap">
        <div class="bar-fill" style="width: {{ [[((s.data_weight / max_w) * 100)|int, 4]|max, 100]|min }}%"></div>
      </div>
    </td>
    <td style="color:#888;font-size:0.8rem">{{ s.data_weight }}</td>
  </tr>
  {% endfor %}
</table>
</body>
</html>
