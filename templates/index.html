<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#e94560">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="へきネイター">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>へきネイター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  h1 {
    font-size: 2rem;
    color: #e94560;
    margin-bottom: 8px;
    text-align: center;
  }
  .subtitle {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 32px;
    text-align: center;
  }
  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .progress-bar {
    height: 6px;
    background: #0f3460;
    border-radius: 3px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e94560, #f5a623);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .question-text {
    font-size: 1.15rem;
    line-height: 1.6;
    text-align: center;
    margin-bottom: 28px;
    min-height: 60px;
  }
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn {
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-yes      { background: #27ae60; color: #fff; }
  .btn-prob-yes { background: #1e7a48; color: #ccc; font-size: 0.9rem; }
  .btn-no       { background: #e74c3c; color: #fff; }
  .btn-prob-no  { background: #8e2a1e; color: #ccc; font-size: 0.9rem; }
  .btn-idk      { background: #555;    color: #ccc; }
  .btn-start  { background: #e94560; color: #fff; width: 100%; }
  .btn-retry  { background: #0f3460; color: #eee; width: 100%; }

  /* 結果画面 */
  .result-icon { font-size: 3rem; text-align: center; margin-bottom: 12px; }
  .result-name {
    font-size: 1.5rem;
    font-weight: bold;
    color: #e94560;
    text-align: center;
    margin-bottom: 8px;
    word-break: break-all;
    line-height: 1.4;
  }
  .result-desc {
    color: #aaa;
    font-size: 0.9rem;
    text-align: center;
    margin-bottom: 6px;
  }
  .result-prob {
    color: #f5a623;
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 12px;
  }
  .result-prob-note {
    color: #666;
    font-size: 0.72rem;
    text-align: center;
    margin-bottom: 16px;
  }
  .profile-section {
    margin-bottom: 16px;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  .profile-label {
    color: #666;
    font-size: 0.75rem;
    text-align: center;
    margin-bottom: 6px;
  }
  .profile-item {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: #888;
    padding: 3px 4px;
  }
  .profile-item span { color: #f5a623; }
  .related-section {
    margin-bottom: 16px;
    border-top: 1px solid #333;
    padding-top: 10px;
  }
  .related-label {
    color: #666;
    font-size: 0.75rem;
    text-align: center;
    margin-bottom: 6px;
  }
  .related-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .related-tag {
    background: #0f3460;
    color: #aaa;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 12px;
  }
  .confirm-label {
    text-align: center;
    font-size: 0.95rem;
    margin-bottom: 10px;
    color: #ccc;
  }
  .confirm-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: #0f3460;
    border: 1px solid #1a4a7a;
    transition: border-color 0.2s;
  }
  .confirm-item.state-yes { border-color: #27ae60; background: #0a2e1a; }
  .confirm-item.state-no  { border-color: #555;    background: #1a1a1a; }
  .confirm-item-name {
    flex: 1;
    font-size: 0.9rem;
    color: #eee;
  }
  .confirm-item-prob {
    font-size: 0.75rem;
    color: #f5a623;
    margin-right: 4px;
  }
  .confirm-toggle {
    display: flex;
    gap: 4px;
  }
  .confirm-toggle button {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #16213e;
    color: #aaa;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .confirm-toggle button.active-yes {
    background: #27ae60;
    color: #fff;
    border-color: #27ae60;
  }
  .confirm-toggle button.active-no {
    background: #555;
    color: #eee;
    border-color: #555;
  }
  .btn-correct { background: #27ae60; color: #fff; margin-bottom: 8px; }
  .btn-wrong   { background: #555;    color: #ccc; }

  /* 正解選択 */
  .fetish-list {
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 16px;
  }
  .fetish-item {
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: #0f3460;
    cursor: pointer;
    font-size: 0.95rem;
    transition: background 0.15s;
  }
  .fetish-item:hover { background: #1a4a8a; }
  .fetish-item.selected { background: #27ae60; color: #fff; }
  .fetish-item.selected:hover { background: #219a52; }

  .msg {
    text-align: center;
    padding: 12px;
    border-radius: 8px;
    background: #27ae60;
    color: #fff;
    font-size: 0.95rem;
  }

  #start-screen { text-align: center; }
  .hidden { display: none !important; }

  .btn-back {
    background: none; border: 1px solid #444; color: #888;
    font-size: 0.8rem; padding: 6px 14px; border-radius: 8px;
    cursor: pointer; margin-bottom: 12px;
  }
  .btn-back:hover { border-color: #888; color: #ccc; }
  .btn-share {
    background: #1a4a8a; color: #eee; font-size: 0.85rem;
    padding: 10px; border-radius: 10px; border: none; cursor: pointer;
    width: 100%; margin-bottom: 8px;
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #e67e22; color: #fff; padding: 10px 20px;
    border-radius: 10px; font-size: 0.85rem; z-index: 999;
    transition: opacity 0.4s;
  }
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-box {
    background: #16213e; border-radius: 16px; padding: 24px 20px;
    width: 88%; max-width: 360px; text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .modal-box p { color: #ccc; font-size: 0.95rem; margin-bottom: 20px; line-height: 1.6; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
  .modal-cancel { background: #333; color: #aaa; }
  .modal-confirm { background: #e94560; color: #fff; }

  .install-banner {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #16213e; border-top: 1px solid #e94560;
    padding: 12px 16px; display: flex; align-items: center;
    gap: 12px; z-index: 998; box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
  }
  .install-banner p { flex: 1; font-size: 0.85rem; color: #ccc; margin: 0; }
  .install-banner .btn-install {
    background: #e94560; color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px; font-size: 0.85rem;
    cursor: pointer; white-space: nowrap;
  }
  .install-banner .btn-dismiss {
    background: none; border: none; color: #666;
    font-size: 1.2rem; cursor: pointer; padding: 4px;
  }

  /* 魔人キャラ */
  .genie-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
    height: 150px;
  }
  #genie {
    filter: drop-shadow(0 0 10px rgba(168,85,247,0.5));
    animation: genie-float 3s ease-in-out infinite;
    transform-origin: 50% 100%;
  }
  @keyframes genie-float {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-12px); }
  }
  #genie.thinking {
    animation: genie-think 2s ease-in-out infinite;
  }
  @keyframes genie-think {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    33%      { transform: translateY(-8px) rotate(1.5deg); }
    66%      { transform: translateY(-4px) rotate(-1.5deg); }
  }
  #genie.reveal {
    animation: genie-reveal 0.4s ease-in-out 4, genie-float 3s ease-in-out 4s infinite;
    filter: drop-shadow(0 0 22px rgba(233,69,96,0.9));
  }
  @keyframes genie-reveal {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.08) translateY(-6px); }
  }
  .eye-blink {
    animation: blink 5s ease-in-out infinite;
  }
  @keyframes blink {
    0%,92%,100% { transform: scaleY(1); }
    96%          { transform: scaleY(0.1); }
  }
  .smoke-wisp {
    animation: wisp 4s ease-in-out infinite;
  }
  @keyframes wisp {
    0%,100% { d: path("M38,190 Q25,170 35,150 Q50,135 60,145 Q70,135 85,150 Q95,170 82,190 Z"); }
    50%      { d: path("M42,190 Q20,172 32,148 Q48,132 60,143 Q72,132 88,148 Q100,172 78,190 Z"); }
  }
  .orb-glow {
    animation: orb-pulse 2s ease-in-out infinite;
  }
  @keyframes orb-pulse {
    0%,100% { opacity: 0.6; r: 8; }
    50%      { opacity: 1.0; r: 10; }
  }
</style>
</head>
<body>

<div style="position:relative;text-align:center;">
  <h1>へきネイター</h1>
  <a href="/admin" style="position:absolute;top:50%;right:0;transform:translateY(-50%);font-size:0.75rem;color:#555;text-decoration:none;">管理</a>
</div>
<p class="subtitle">あなたの性癖を当ててみせましょう…</p>

<!-- 魔人キャラ -->
<div class="genie-wrap">
<svg id="genie" viewBox="0 0 120 190" width="110" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="eyeG" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="45%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#6b21a8"/>
    </radialGradient>
    <radialGradient id="bodyG" cx="50%" cy="20%" r="75%">
      <stop offset="0%" stop-color="#3b1f6e"/>
      <stop offset="100%" stop-color="#0d0020"/>
    </radialGradient>
    <radialGradient id="orbG" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#1a0040"/>
    </radialGradient>
    <filter id="glow-f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 煙の体 -->
  <path d="M38,190 Q22,168 33,148 Q48,130 60,142 Q72,130 87,148 Q98,168 82,190 Z"
        fill="url(#bodyG)" opacity="0.85"/>
  <!-- ローブの筋 -->
  <path d="M48,155 Q46,172 47,186" stroke="#4a2090" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M60,148 Q60,170 60,186" stroke="#4a2090" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M72,155 Q74,172 73,186" stroke="#4a2090" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- 水晶玉 -->
  <circle cx="36" cy="152" r="11" fill="url(#orbG)" stroke="#7c3aed" stroke-width="1" opacity="0.85"/>
  <circle class="orb-glow" cx="36" cy="152" r="8" fill="#c084fc" opacity="0.3"/>
  <ellipse cx="33" cy="149" rx="3" ry="2" fill="white" opacity="0.35"/>

  <!-- 首 -->
  <rect x="50" y="90" width="20" height="18" rx="6" fill="#1e0838"/>

  <!-- 頭 -->
  <ellipse cx="60" cy="68" rx="30" ry="32" fill="#1e0838"/>

  <!-- 角 -->
  <polygon points="36,54 27,26 44,46" fill="#e94560"/>
  <polygon points="84,54 93,26 76,46" fill="#e94560"/>

  <!-- ターバン装飾 -->
  <path d="M31,58 Q60,48 89,58" stroke="#7c3aed" stroke-width="5" fill="none"
        stroke-linecap="round" opacity="0.8"/>
  <circle cx="60" cy="53" r="5" fill="#e94560"/>
  <circle cx="60" cy="53" r="2.5" fill="#ff8fa3"/>

  <!-- 目 (瞬き対応) -->
  <g class="eye-blink" style="transform-origin:47px 66px">
    <ellipse cx="47" cy="66" rx="10" ry="11" fill="url(#eyeG)" filter="url(#glow-f)"/>
    <ellipse cx="47" cy="67" rx="5" ry="6" fill="#3b0068"/>
    <circle  cx="44" cy="63" r="2.2" fill="white" opacity="0.85"/>
  </g>
  <g class="eye-blink" style="transform-origin:73px 66px">
    <ellipse cx="73" cy="66" rx="10" ry="11" fill="url(#eyeG)" filter="url(#glow-f)"/>
    <ellipse cx="73" cy="67" rx="5" ry="6" fill="#3b0068"/>
    <circle  cx="70" cy="63" r="2.2" fill="white" opacity="0.85"/>
  </g>

  <!-- 眉 -->
  <path id="brow-l" d="M37,53 Q47,48 56,53" stroke="#9333ea" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>
  <path id="brow-r" d="M64,53 Q73,48 83,53" stroke="#9333ea" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>

  <!-- 口 (デフォルト：ニヤり) -->
  <path id="mouth-smirk" d="M45,82 Q54,89 70,82" stroke="#e94560" stroke-width="2.5"
        fill="none" stroke-linecap="round"/>
  <!-- 口 (考え中：へ字) -->
  <path id="mouth-think" d="M46,84 Q56,80 68,84" stroke="#e94560" stroke-width="2.5"
        fill="none" stroke-linecap="round" opacity="0"/>
  <!-- 口 (結果：ニタァ) -->
  <g id="mouth-reveal" opacity="0">
    <path d="M40,80 Q60,96 80,80 L78,86 Q60,100 42,86 Z" fill="white"/>
    <path d="M40,80 Q60,96 80,80" stroke="#e94560" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 考える腕 (デフォルト非表示) -->
  <g id="arm-think" opacity="0">
    <path d="M86,120 Q96,105 90,95 Q84,86 76,84"
          stroke="#2d1560" stroke-width="7" fill="none" stroke-linecap="round"/>
    <ellipse cx="74" cy="82" rx="8" ry="7" fill="#2d1560"/>
    <path d="M68,80 Q74,76 80,80" stroke="#4a2090" stroke-width="1.5" fill="none"/>
  </g>
</svg>
</div>

<div class="card">

  <!-- スタート画面 -->
  <div id="start-screen">
    <p style="margin-bottom:20px;color:#aaa;font-size:0.95rem;line-height:1.7;">
      あなたの性癖を暴きます。<br>
      質問に正直に答えてください。<br>
      遊ぶほど賢くなります。
    </p>
    <button class="btn btn-start" onclick="startGame()">スタート</button>
  </div>

  <!-- 質問画面 -->
  <div id="question-screen" class="hidden">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <button class="btn-back" id="btn-back" onclick="goBack()">← 戻る</button>
      <button class="btn-back" onclick="confirmRestart()">最初から</button>
    </div>
    <div class="question-text" id="question-text">読み込み中…</div>
    <div class="btn-group">
      <button class="btn btn-yes"      onclick="sendAnswer(1)">はい</button>
      <button class="btn btn-prob-yes" onclick="sendAnswer(0.5)">どちらかといえばはい</button>
      <button class="btn btn-idk"      onclick="sendAnswer(0)">わからない</button>
      <button class="btn btn-prob-no"  onclick="sendAnswer(-0.5)">どちらかといえばいいえ</button>
      <button class="btn btn-no"       onclick="sendAnswer(-1)">いいえ</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div id="result-screen" class="hidden">
    <div class="result-icon">🔮</div>
    <div class="result-name" id="result-name"></div>
    <div class="result-desc" id="result-desc"></div>
    <div class="result-prob" id="result-prob"></div>
    <div class="result-prob-note">※ モデルの推定一致度です（実際の正解率とは異なります）</div>
    <div class="profile-section hidden" id="profile-section">
      <div class="profile-label">他に該当しそうなジャンル</div>
      <div id="profile-list"></div>
    </div>
    <div class="related-section hidden" id="related-section">
      <div class="related-label">関連ジャンル</div>
      <div class="related-tags" id="related-tags"></div>
    </div>
    <div class="confirm-label">各項目の正解を教えてください</div>
    <div id="confirm-items"></div>
    <button class="btn btn-correct" style="width:100%;margin-top:4px;" onclick="submitConfirm()">確定して学習</button>
    <button class="btn btn-idk" style="width:100%;margin-top:6px;font-size:0.82rem;" onclick="showStart()">スキップ</button>
  </div>

  <!-- 正解選択画面 -->
  <div id="teach-screen" class="hidden">
    <p id="teach-label" style="margin-bottom:12px;color:#aaa;font-size:0.9rem;text-align:center;"></p>
    <div class="fetish-list" id="fetish-list"></div>
    <button class="btn btn-yes" id="teach-submit-btn" style="width:100%;margin-bottom:8px;display:none;" onclick="submitTeach()">学習する</button>
    <hr style="border-color:#333;margin:14px 0;">
    <div id="add-step1">
      <p style="color:#aaa;font-size:0.85rem;margin-bottom:10px;">あなたにとって重要な性癖がリストにない場合はこちらに記入</p>
      <input id="new-fetish-name" type="text" placeholder="性癖の名前（例：獣耳ヒロイン）"
        style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0f3460;color:#eee;font-size:0.95rem;margin-bottom:8px;">
      <button class="btn btn-yes" style="width:100%;margin-bottom:8px;" onclick="addFetishStep1()">記入する</button>
    </div>
    <div id="add-step-similar" style="display:none">
      <p style="color:#f5a623;font-size:0.85rem;margin-bottom:8px;text-align:center;">似た性癖が見つかりました。これと同じですか？</p>
      <div id="add-similar-list"></div>
      <button class="btn btn-idk" style="width:100%;margin-top:6px;font-size:0.85rem;" onclick="addFetishConfirmNew()">違う、新しく追加する</button>
    </div>
    <div id="add-step2" style="display:none">
      <p style="color:#aaa;font-size:0.85rem;margin-bottom:6px;">「<span id="add-confirmed-name"></span>」の説明を入力してください</p>
      <input id="new-fetish-desc" type="text" placeholder="説明（省略可）"
        style="width:100%;padding:10px;border-radius:8px;border:1px solid #333;background:#0f3460;color:#eee;font-size:0.9rem;margin-bottom:8px;">
      <button class="btn btn-yes" style="width:100%;margin-bottom:8px;" onclick="addFetishStep2(false)">登録する</button>
      <button class="btn btn-idk" style="width:100%;margin-bottom:8px;font-size:0.85rem;" onclick="addFetishStep2(true)">説明をスキップ</button>
    </div>
    <div id="add-step-more" style="display:none">
      <div id="add-added-list" style="margin-bottom:8px;"></div>
      <button class="btn btn-yes" style="width:100%;margin-bottom:8px;" onclick="addFetishMore()">もう1件追加する</button>
      <button class="btn btn-correct" style="width:100%;margin-bottom:8px;" onclick="addFetishDone()">完了</button>
    </div>
    <button class="btn btn-retry" id="add-skip-btn" onclick="showStart()">スキップ</button>
  </div>

  <!-- 完了メッセージ -->
  <div id="done-screen" class="hidden">
    <div class="msg" id="done-msg"></div>
    <br>
    <button class="btn-share" onclick="shareResult()">結果をシェア / コピー</button>
    <button class="btn btn-retry" onclick="showStart()">もう一回</button>
  </div>

</div>

<div class="toast hidden" id="toast"></div>

<div class="modal-overlay hidden" id="modal-restart">
  <div class="modal-box">
    <p>最初からやり直しますか？<br>現在の進行状況は失われます。</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-restart')">キャンセル</button>
      <button class="modal-confirm" onclick="doRestart()">やり直す</button>
    </div>
  </div>
</div>

<div class="install-banner hidden" id="install-banner">
  <p id="install-msg">ホーム画面に追加してオフラインでも使えます</p>
  <button class="btn-install" id="btn-install">追加する</button>
  <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
</div>

<script>
let currentQ = null;
let lastFetishName = '';
let _diagnosedName = '';

function show(id) {
  ['start-screen','question-screen','result-screen','teach-screen','done-screen']
    .forEach(s => document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function setGenieState(state) {
  const g = document.getElementById('genie');
  g.classList.remove('thinking', 'reveal');

  const smirk  = document.getElementById('mouth-smirk');
  const think  = document.getElementById('mouth-think');
  const reveal = document.getElementById('mouth-reveal');
  const arm    = document.getElementById('arm-think');
  const browL  = document.getElementById('brow-l');
  const browR  = document.getElementById('brow-r');

  smirk.setAttribute('opacity',  '0');
  think.setAttribute('opacity',  '0');
  reveal.setAttribute('opacity', '0');
  arm.setAttribute('opacity',    '0');
  browL.setAttribute('d', 'M37,53 Q47,48 56,53');
  browR.setAttribute('d', 'M64,53 Q73,48 83,53');

  if (state === 'thinking') {
    g.classList.add('thinking');
    think.setAttribute('opacity', '1');
    arm.setAttribute('opacity', '1');
    // 片眉を上げて考え顔
    browL.setAttribute('d', 'M37,55 Q47,50 56,55');
    browR.setAttribute('d', 'M64,50 Q73,45 83,50');
  } else if (state === 'reveal') {
    g.classList.add('reveal');
    reveal.setAttribute('opacity', '1');
    // 両眉をつり上げてニタァ顔
    browL.setAttribute('d', 'M36,50 Q47,44 56,50');
    browR.setAttribute('d', 'M64,50 Q73,44 84,50');
  } else {
    smirk.setAttribute('opacity', '1');
  }
}

function showStart() { show('start-screen'); setGenieState('idle'); }

function confirmRestart() {
  document.getElementById('modal-restart').classList.remove('hidden');
}
function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}
function doRestart() {
  closeModal('modal-restart');
  showStart();
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || '#e67e22';
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

let _fetching = false;

async function apiFetch(url, body) {
  let res;
  try {
    res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: body !== undefined ? JSON.stringify(body) : undefined,
    });
  } catch {
    showToast('通信エラーが発生しました。リロードしてください。', '#c0392b');
    throw new Error('network');
  }
  if (!res.ok) {
    let msg = `サーバーエラー (${res.status})`;
    try { const e = await res.json(); if (e.message) msg = e.message; } catch {}
    showToast(msg, '#c0392b');
    throw new Error(msg);
  }
  return await res.json();
}

function setAnswerButtons(disabled) {
  document.querySelectorAll('#question-screen .btn').forEach(b => b.disabled = disabled);
}

async function startGame() {
  const data = await apiFetch('/api/start');
  showQuestion(data);
}

function showQuestion(data) {
  currentQ = data.question_id;
  document.getElementById('question-text').textContent = data.question;
  const pct = Math.round((data.count / data.total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('btn-back').style.visibility = data.count > 0 ? 'visible' : 'hidden';
  show('question-screen');
  setGenieState('thinking');
}

async function goBack() {
  const data = await apiFetch('/api/back');
  if (data.status === 'no_history') return;
  showQuestion(data);
}

async function sendAnswer(ans) {
  if (_fetching) return;
  _fetching = true;
  setAnswerButtons(true);
  try {
    const data = await apiFetch('/api/answer', {question_id: currentQ, answer: ans});
    if (data.action === 'question') {
      showQuestion(data);
    } else {
      showGuess(data);
    }
  } finally {
    _fetching = false;
    setAnswerButtons(false);
  }
}

function showGuess(data) {
  setGenieState('reveal');
  window._guessedId   = data.fetish_id;
  window._compoundIds = (data.compound || []).map(c => c.fetish_id);
  window._guessData   = data;

  if (data.compound && data.compound.length > 0) {
    const names = [data.fetish_name, ...data.compound.map(c => c.fetish_name)];
    document.getElementById('result-name').textContent = names.join(' × ');
    lastFetishName = names.join(' × ');
  } else {
    document.getElementById('result-name').textContent = data.fetish_name;
    lastFetishName = data.fetish_name;
  }
  _diagnosedName = lastFetishName;
  document.getElementById('result-desc').textContent = data.fetish_desc;
  document.getElementById('result-prob').textContent = `一致度: ${data.probability}%`;

  // 項目ごとの正誤ボタンを生成
  const items = [{fetish_id: data.fetish_id, fetish_name: data.fetish_name, probability: data.probability}];
  (data.compound || []).forEach(c => items.push(c));
  const container = document.getElementById('confirm-items');
  container.innerHTML = items.map(item => `
    <div class="confirm-item" id="ci-${item.fetish_id}" data-id="${item.fetish_id}" data-state="">
      <span class="confirm-item-name">${item.fetish_name}</span>
      <span class="confirm-item-prob">${item.probability}%</span>
      <div class="confirm-toggle">
        <button onclick="setItemState(${item.fetish_id}, 'yes', this)">○</button>
        <button onclick="setItemState(${item.fetish_id}, 'no',  this)">×</button>
      </div>
    </div>`).join('');

  const profileSection = document.getElementById('profile-section');
  const profileList    = document.getElementById('profile-list');
  if (data.profile && data.profile.length > 0) {
    profileList.innerHTML = data.profile.map(r =>
      `<div class="profile-item">${r.fetish_name}<span>${r.probability}%</span></div>`
    ).join('');
    profileSection.classList.remove('hidden');
  } else {
    profileSection.classList.add('hidden');
  }

  const relatedSection = document.getElementById('related-section');
  const relatedTags    = document.getElementById('related-tags');
  if (data.related && data.related.length > 0) {
    relatedTags.innerHTML = data.related.map(r =>
      `<span class="related-tag">${r.fetish_name}</span>`
    ).join('');
    relatedSection.classList.remove('hidden');
  } else {
    relatedSection.classList.add('hidden');
  }

  show('result-screen');
}

function setItemState(id, state, btn) {
  const item = document.getElementById(`ci-${id}`);
  item.dataset.state = state;
  item.className = `confirm-item state-${state}`;
  const btns = item.querySelectorAll('.confirm-toggle button');
  btns.forEach(b => b.className = '');
  btn.className = state === 'yes' ? 'active-yes' : 'active-no';
}

async function submitConfirm() {
  const items = document.querySelectorAll('#confirm-items .confirm-item');
  const correctIds = [];
  const wrongCount  = [];
  items.forEach(item => {
    if (item.dataset.state === 'yes') correctIds.push(parseInt(item.dataset.id));
    else wrongCount.push(parseInt(item.dataset.id));
  });

  // ○がついた項目を即学習（total_n で√n スケーリング）
  if (correctIds.length > 0) {
    for (const fid of correctIds) {
      await apiFetch('/api/teach', {fetish_id: fid, total_n: correctIds.length});
    }
  }

  const missCount = wrongCount.length;
  if (missCount === 0) {
    // 全部正解
    const names = correctIds.map(id => {
      const el = document.getElementById(`ci-${id}`);
      return el ? el.querySelector('.confirm-item-name').textContent : '';
    }).filter(Boolean);
    lastFetishName = names.join(' × ');
    document.getElementById('done-msg').textContent = `✓「${names.join('」「')}」として学習しました！`;
    show('done-screen');
    return;
  }

  // 外れあり → 正解を自由に選んでもらう
  const data = await apiFetch('/api/confirm', {correct: false, fetish_id: window._guessedId, compound_ids: window._compoundIds || []});
  if (!data || !data.fetishes) return;

  window._teachSelected = new Map(); // id → name
  window._teachCorrectIds = correctIds;

  document.getElementById('teach-label').textContent = '正解の性癖を選んでください（複数選択可）';

  const list = document.getElementById('fetish-list');
  list.innerHTML = '';
  data.fetishes.forEach(f => {
    const div = document.createElement('div');
    div.className = 'fetish-item';
    div.id = `ti-${f.id}`;
    div.textContent = f.name;
    div.onclick = () => toggleTeachItem(f.id, f.name, div);
    list.appendChild(div);
  });



  document.getElementById('teach-submit-btn').style.display = '';
  updateTeachSubmitBtn();
  show('teach-screen');
}

function toggleTeachItem(id, name, el) {
  if (window._teachSelected.has(id)) {
    window._teachSelected.delete(id);
    el.classList.remove('selected');
  } else {
    window._teachSelected.set(id, name);
    el.classList.add('selected');
  }
  updateTeachSubmitBtn();
}

function updateTeachSubmitBtn() {
  const btn = document.getElementById('teach-submit-btn');
  const n = window._teachSelected ? window._teachSelected.size : 0;
  btn.textContent = n > 0 ? `${n}件を学習する` : `選んで学習する`;
  btn.disabled = n === 0;
}

async function submitTeach() {
  if (_fetching) return;
  _fetching = true;
  try {
    const selected = window._teachSelected || new Map();
    const totalN = selected.size;
    for (const [fid] of selected) {
      await apiFetch('/api/teach', {fetish_id: fid, total_n: totalN});
    }
    const correctNames = (window._teachCorrectIds || []).map(id => {
      const el = document.getElementById(`ci-${id}`);
      return el ? el.querySelector('.confirm-item-name').textContent : '';
    }).filter(Boolean);
    const wrongNames = [...selected.values()];
    const allNames = [...correctNames, ...wrongNames];
    window._addedItems = [];
    lastFetishName = allNames.join(' × ') || lastFetishName;
    const msg = allNames.length > 0
      ? `✓「${allNames.join('」「')}」として学習しました！`
      : '✓ 学習しました！ありがとうございます。';
    document.getElementById('done-msg').textContent = msg;
    show('done-screen');
  } finally {
    _fetching = false;
  }
}

async function addFetishStep1() {
  if (_fetching) return;
  const name = document.getElementById('new-fetish-name').value.trim();
  if (!name) { alert('名前を入力してください'); return; }
  _fetching = true;
  try {
    const data = await apiFetch('/api/add_fetish', {name});
    if (data.status === 'similar') {
      const list = document.getElementById('add-similar-list');
      list.innerHTML = data.candidates.map(f =>
        `<div class="fetish-item" onclick="pickSimilar(${f.id}, '${f.name.replace(/'/g, "\\'")}')">${f.name}</div>`
      ).join('');
      document.getElementById('add-step1').style.display = 'none';
      document.getElementById('add-step-similar').style.display = '';
    } else if (data.status === 'needs_desc') {
      _showDescStep(name);
    } else {
      _finishAdd(data);
    }
  } finally {
    _fetching = false;
  }
}

function pickSimilar(id, name) {
  // 学習は完了時にまとめて行う（既存性癖なので is_new=false）
  _finishAdd({fetish_id: id, fetish_name: name, is_new: false});
}

function addFetishConfirmNew() {
  const name = document.getElementById('new-fetish-name').value.trim();
  document.getElementById('add-step-similar').style.display = 'none';
  _showDescStep(name);
}

function _showDescStep(name) {
  document.getElementById('add-confirmed-name').textContent = name;
  document.getElementById('new-fetish-desc').value = '';
  document.getElementById('add-step1').style.display = 'none';
  document.getElementById('add-step2').style.display = '';
}

async function addFetishStep2(skip) {
  if (_fetching) return;
  const name = document.getElementById('new-fetish-name').value.trim();
  const desc = skip ? '' : document.getElementById('new-fetish-desc').value.trim();
  _fetching = true;
  try {
    const data = await apiFetch('/api/add_fetish', {name, desc, confirmed: true});
    _finishAdd(data);
  } finally {
    _fetching = false;
  }
}

function _finishAdd(data) {
  if (!window._addedItems) window._addedItems = [];
  window._addedItems.push({id: data.fetish_id, name: data.fetish_name, is_new: !!data.is_new});

  document.getElementById('add-step1').style.display = 'none';
  document.getElementById('add-step-similar').style.display = 'none';
  document.getElementById('add-step2').style.display = 'none';
  document.getElementById('new-fetish-name').value = '';

  if (window._addedItems.length < 3) {
    _renderAddedList();
    document.getElementById('add-step-more').style.display = '';
    document.getElementById('add-skip-btn').style.display = 'none';
  } else {
    addFetishDone();
  }
}

function _renderAddedList() {
  const container = document.getElementById('add-added-list');
  container.innerHTML = (window._addedItems || []).map(item => `
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span style="flex:1;font-size:0.82rem;color:#27ae60;">✓ ${item.name}</span>
      <button onclick="deleteAddedItem(${item.id}, '${item.name.replace(/'/g, "\\'")}')"
        style="background:none;border:1px solid #555;color:#888;border-radius:4px;padding:2px 8px;font-size:0.75rem;cursor:pointer;">×</button>
    </div>`).join('');
}

async function deleteAddedItem(id, name) {
  if (_fetching) return;
  _fetching = true;
  try {
    const item = (window._addedItems || []).find(i => i.id === id);
    // 新規追加分のみDBから削除（既存を選んだだけなら記録から外すだけ）
    if (item && item.is_new) {
      const res = await fetch(`/api/fetish/${id}`, {method: 'DELETE'});
      if (!res.ok && res.status !== 404) {
        showToast('削除に失敗しました', '#c0392b'); return;
      }
    }
    window._addedItems = (window._addedItems || []).filter(item => item.id !== id);
    if (window._addedItems.length === 0) {
      document.getElementById('add-step-more').style.display = 'none';
      document.getElementById('add-step1').style.display = '';
      document.getElementById('add-skip-btn').style.display = '';
    } else {
      _renderAddedList();
    }
  } finally {
    _fetching = false;
  }
}

function addFetishMore() {
  document.getElementById('add-step-more').style.display = 'none';
  document.getElementById('add-step1').style.display = '';
  document.getElementById('add-skip-btn').style.display = '';
}

async function addFetishDone() {
  if (_fetching) return;
  const items = window._addedItems || [];
  window._addedItems = [];
  document.getElementById('add-step-more').style.display = 'none';
  document.getElementById('add-step1').style.display = '';
  document.getElementById('add-skip-btn').style.display = '';
  if (items.length > 0) {
    _fetching = true;
    try {
      await apiFetch('/api/finalize_added', {
        items: items.map(i => ({id: i.id, is_new: i.is_new}))
      });
    } finally {
      _fetching = false;
    }
  }
  const names = items.map(i => i.name);
  lastFetishName = names.join(' × ');
  document.getElementById('done-msg').textContent =
    `✓「${names.join('」「')}」を学習しました！`;
  show('done-screen');
}

function shareResult() {
  const appUrl = window.location.origin;
  const text = `へきネイターで診断したら「${_diagnosedName}」でした！\nあなたの性癖も試してみて → ${appUrl} #へきネイター`;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('クリップボードにコピーしました', '#27ae60'));
  }
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'noopener');
}
// インストール促進
let deferredPrompt = null;
const banner = document.getElementById('install-banner');

function dismissInstall() {
  banner.classList.add('hidden');
  localStorage.setItem('install-dismissed', '1');
}

// Android / Chrome: beforeinstallprompt を捕捉（ページロード前でも取りこぼさないよう最上位に登録）
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  if (!localStorage.getItem('install-dismissed')) {
    banner.classList.remove('hidden');
  }
});

document.getElementById('btn-install').onclick = async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    banner.classList.add('hidden');
  } else {
    showToast('ブラウザのメニュー →「ホーム画面に追加」からインストールできます', '#1a4a8a');
    banner.classList.add('hidden');
  }
};

// インストール完了時にバナーを消す
window.addEventListener('appinstalled', () => banner.classList.add('hidden'));

// iOS Safari: スタンドアロンでなければ手順を案内
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
if (isIos && !isStandalone && !localStorage.getItem('install-dismissed')) {
  document.getElementById('install-msg').textContent =
    'ホーム画面に追加：Safari の 共有ボタン → "ホーム画面に追加"';
  document.getElementById('btn-install').style.display = 'none';
  banner.classList.remove('hidden');
}

// SW登録・更新検知
if ('serviceWorker' in navigator) {
  let swReg = null;

  function showUpdateBanner() {
    const msg = document.getElementById('install-msg');
    const btn = document.getElementById('btn-install');
    const banner = document.getElementById('install-banner');
    msg.textContent = '新しいバージョンがあります';
    btn.textContent = '今すぐ更新';
    btn.onclick = () => {
      if (swReg && swReg.waiting) {
        swReg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    };
    banner.classList.remove('hidden');
  }

  // 新SW がアクティブになったらリロード（無限ループ防止フラグ付き）
  let reloading = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!reloading) { reloading = true; location.reload(); }
  });

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      swReg = reg;

      // 既に waiting 中の SW がある場合（タブを長時間開いていたケース）
      if (reg.waiting) { showUpdateBanner(); return; }

      // 新しい SW がインストールされたとき
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
    }).catch(() => {});
  });
}
</script>
