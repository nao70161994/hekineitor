name: Restore Matrix

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '「restore」と入力して実行確認'
        required: true
      backup_run_id:
        description: '復元する Matrix Backup workflow の run_id'
        required: true

jobs:
  restore:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'restore' }}

    steps:
      - name: Require backup_run_id
        env:
          BACKUP_RUN_ID: ${{ github.event.inputs.backup_run_id }}
        run: |
          if [ -z "$BACKUP_RUN_ID" ]; then
            echo "backup_run_id is required. Run Matrix Backup first and pass that workflow run_id."
            exit 1
          fi
          case "$BACKUP_RUN_ID" in
            *[!0-9]*)
              echo "backup_run_id must be a numeric workflow run_id."
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4

      - name: Download backup artifact
        uses: actions/download-artifact@v4
        with:
          name: matrix-backup-${{ github.event.inputs.backup_run_id }}
          run-id: ${{ github.event.inputs.backup_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: data

      - name: Check backup exists
        run: |
          if [ ! -f data/matrix_backup.json ]; then
            echo "Downloaded artifact did not include data/matrix_backup.json"
            exit 1
          fi
          echo "バックアップサイズ: $(wc -c < data/matrix_backup.json) bytes"

      - name: Validate backup payload
        env:
          MATRIX_BACKUP_MAX_AGE_HOURS: 48
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          with open('data/matrix_backup.json', encoding='utf-8') as f:
              payload = json.load(f)
          if not isinstance(payload, dict):
              raise SystemExit('matrix_backup.json must be a JSON object')
          matrix_rows = payload.get('matrix_rows')
          if not isinstance(matrix_rows, list) or not matrix_rows:
              raise SystemExit('matrix_backup.json must include non-empty matrix_rows')
          fetishes = payload.get('fetishes')
          if not isinstance(fetishes, list) or not fetishes:
              raise SystemExit('matrix_backup.json must include non-empty fetishes')
          with open('data/questions.json', encoding='utf-8') as f:
              questions = json.load(f)
          if not isinstance(questions, list) or not questions:
              raise SystemExit('data/questions.json must include non-empty questions')
          expected_rows = len(fetishes) * len(questions)
          if len(matrix_rows) != expected_rows:
              raise SystemExit(
                  f'matrix_backup.json row count mismatch: expected {expected_rows}, got {len(matrix_rows)}'
              )

          metadata = payload.get('metadata') if isinstance(payload.get('metadata'), dict) else {}
          exported_at = payload.get('exported_at') or metadata.get('exported_at')
          if not exported_at:
              raise SystemExit('matrix_backup.json must include exported_at metadata')
          try:
              exported = datetime.fromisoformat(exported_at.replace('Z', '+00:00'))
          except ValueError as exc:
              raise SystemExit(f'exported_at must be ISO 8601: {exc}') from exc
          if exported.tzinfo is None:
              exported = exported.replace(tzinfo=timezone.utc)
          age_seconds = (datetime.now(timezone.utc) - exported.astimezone(timezone.utc)).total_seconds()
          max_age_seconds = int(os.environ.get('MATRIX_BACKUP_MAX_AGE_HOURS', '48')) * 60 * 60
          if age_seconds < 0:
              raise SystemExit('matrix_backup.json exported_at is in the future')
          if age_seconds > max_age_seconds:
              raise SystemExit(f'matrix_backup.json is stale: exported_at={exported.isoformat()}')

          print(f"matrix_rows: {len(matrix_rows)}")
          PY

      - name: Import matrix to Render
        run: |
          python - <<'PY'
          import json

          with open('data/matrix_backup.json', encoding='utf-8') as f:
              payload = json.load(f)
          if not isinstance(payload, dict):
              raise SystemExit('matrix_backup.json must be a JSON object')
          payload['confirm_text'] = 'IMPORT'
          with open('/tmp/restore_payload.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False)
          PY
          curl -s -c /tmp/admin_cookies.txt \
            -u "${{ secrets.ADMIN_USER }}:${{ secrets.ADMIN_PASS }}" \
            "${{ secrets.APP_URL }}/admin" \
            -o /tmp/admin.html
          CSRF=$(python - <<'PY'
          import re
          html = open('/tmp/admin.html', encoding='utf-8').read()
          match = re.search(r'csrfToken\s*[:=]\s*["\']([^"\']+)', html)
          if not match:
              raise SystemExit('CSRF token not found in /admin response')
          print(match.group(1))
          PY
          )
          HTTP=$(curl -s -w "%{http_code}" -o /tmp/restore_result.json \
            -X POST \
            -b /tmp/admin_cookies.txt \
            -u "${{ secrets.ADMIN_USER }}:${{ secrets.ADMIN_PASS }}" \
            -H "Content-Type: application/json" \
            -H "X-CSRF-Token: $CSRF" \
            -d @/tmp/restore_payload.json \
            "${{ secrets.APP_URL }}/api/admin/import_matrix")
          echo "HTTP status: $HTTP"
          cat /tmp/restore_result.json
          if [ "$HTTP" != "200" ]; then
            echo "Restore failed"
            exit 1
          fi
          python - <<'PY'
          import json

          with open('/tmp/restore_payload.json', encoding='utf-8') as f:
              payload = json.load(f)
          with open('/tmp/restore_result.json', encoding='utf-8') as f:
              result = json.load(f)

          expected = len(payload.get('matrix_rows', []))
          imported = result.get('imported_rows')
          skipped = result.get('skipped_rows', 0)
          if imported != expected:
              raise SystemExit(f"imported_rows mismatch: expected {expected}, got {imported}")
          if skipped > 0:
              raise SystemExit(f"Restore skipped rows: {skipped}")
          PY
          echo "復元完了"
