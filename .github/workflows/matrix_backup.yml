name: Matrix Backup & DB Expiry Check

on:
  schedule:
    - cron: '0 2 * * *'   # 毎日 AM2時(UTC) = 11時(JST)
  workflow_dispatch:

jobs:
  backup-and-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v7

      - name: Export matrix from Render
        run: |
          HTTP=$(curl -s -w "%{http_code}" -o data/matrix_backup.json \
            -u "${{ secrets.ADMIN_USER }}:${{ secrets.ADMIN_PASS }}" \
            "${{ secrets.APP_URL }}/api/admin/export_matrix")
          echo "HTTP status: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "Export failed"
            cat data/matrix_backup.json
            exit 1
          fi
          echo "Backup size: $(wc -c < data/matrix_backup.json) bytes"

      - name: Validate backup payload
        run: python scripts/validate_matrix_backup.py data/matrix_backup.json --max-age-days 1

      - name: Upload backup artifact
        uses: actions/upload-artifact@v7
        with:
          name: matrix-backup-${{ github.run_id }}
          path: data/matrix_backup.json
          retention-days: 30

      - name: Send test notification (manual run only)
        if: github.event_name == 'workflow_dispatch'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          if [ -z "$NTFY_TOPIC" ]; then
            echo "NTFY_TOPIC 未設定のためスキップ"
          else
            curl --fail-with-body -s -o /dev/null -w "%{http_code}" \
              -H "Title: へきネイター テスト通知" \
              -H "Priority: default" \
              -H "Tags: white_check_mark" \
              -d "バックアップとDB監視が正常に動作しています" \
              "https://ntfy.sh/$NTFY_TOPIC"
            echo " ntfy送信完了"
          fi

      - name: Check DB expiry via Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_POSTGRES_ID: ${{ secrets.RENDER_POSTGRES_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import os, json, subprocess
          from datetime import datetime, timezone, timedelta
          import urllib.request

          api_key = os.environ.get('RENDER_API_KEY', '')
          pg_id   = os.environ.get('RENDER_POSTGRES_ID', '')
          if not api_key or not pg_id:
              print('RENDER_API_KEY / RENDER_POSTGRES_ID 未設定のためスキップ')
              raise SystemExit(0)

          req = urllib.request.Request(
              f'https://api.render.com/v1/postgres/{pg_id}',
              headers={'Authorization': f'Bearer {api_key}', 'Accept': 'application/json'}
          )
          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          created_str = data.get('createdAt', '')
          created = datetime.fromisoformat(created_str.replace('Z', '+00:00'))
          now = datetime.now(timezone.utc)
          days_old = (now - created).days
          days_left = 90 - days_old
          print(f"DB作成日: {created.date()} / 経過: {days_old}日 / 残り: {days_left}日")

          if days_left <= 10:
              repo  = os.environ['REPO']
              title = '⚠️ Render PostgreSQL 期限切れ警告'
              body  = (
                  f'## Render PostgreSQL 期限切れ警告\n\n'
                  f'- **作成日**: {created.date()}\n'
                  f'- **期限切れまで**: {days_left}日\n\n'
                  f'## 対応手順\n'
                  f'1. [Renderダッシュボード](https://dashboard.render.com)で新しいPostgreSQLを作成\n'
                  f'2. RenderサービスのEnvironmentで`DATABASE_URL`を新しい接続文字列に更新\n'
                  f'3. サービスを再デプロイ\n'
                  f'4. GitHubActions「Restore Matrix」を手動実行して学習データを復元\n'
              )
              # GitHub Issue（重複防止）
              result = subprocess.run(
                  ['gh', 'issue', 'list', '--repo', repo, '--state', 'open', '--search', f'{title} in:title', '--json', 'number,title'],
                  capture_output=True, text=True, check=True
              )
              existing = [item for item in json.loads(result.stdout or '[]') if item.get('title') == title]
              if not existing:
                  subprocess.run(
                      ['gh', 'issue', 'create', '--repo', repo, '--title', title, '--body', body],
                      check=True
                  )
                  print('GitHub Issueを作成しました')
              else:
                  issue_number = str(existing[0]['number'])
                  subprocess.run(
                      ['gh', 'issue', 'edit', issue_number, '--repo', repo, '--body', body],
                      check=True,
                  )
                  print('既存のIssue本文を更新しました')

              # ntfy.sh プッシュ通知
              ntfy_topic = os.environ.get('NTFY_TOPIC', '')
              if ntfy_topic:
                  msg = f'RenderのDBが{days_left}日後に期限切れになります。Renderで新DBを作成してください。'
                  req2 = urllib.request.Request(
                      f'https://ntfy.sh/{ntfy_topic}',
                      data=msg.encode(),
                      headers={
                          'Title': 'Hekineitor DB expiry warning',
                          'Priority': 'high',
                          'Tags': 'warning,database',
                      },
                      method='POST'
                  )
                  with urllib.request.urlopen(req2) as r:
                      print(f'ntfy送信完了: {r.status}')
              else:
                  print('NTFY_TOPIC 未設定のためプッシュ通知スキップ')
          EOF
